<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 64" width="340" height="64" role="img" aria-label="Institute of Digital Risk">
  <!-- Cube icon -->
  <!-- Top face: orange -->
  <polygon points="32,4 60,20 32,36 4,20" fill="#F46012"/>
  <!-- Left face: dark blue-gray -->
  <polygon points="4,20 32,36 32,58 4,42" fill="#1C1F28"/>
  <!-- Right face: near-black with slight warmth -->
  <polygon points="60,20 32,36 32,58 60,42" fill="#0E1016"/>
  <!-- Edge lines -->
  <polyline points="4,20 32,4 60,20" fill="none" stroke="#ffffff" stroke-width="0.6" opacity="0.2"/>
  <line x1="32" y1="36" x2="32" y2="58" stroke="#F46012" stroke-width="0.8" opacity="0.35"/>
  <line x1="32" y1="4" x2="32" y2="36" stroke="#0E1016" stroke-width="1.2" opacity="0.5"/>

  <!-- Wordmark -->
  <!-- "IDR" large monogram -->
  <text x="78" y="40" font-family="'Arial Narrow', 'Barlow Condensed', sans-serif"
        font-size="32" font-weight="800" letter-spacing="3" fill="#F46012">IDR</text>
  <!-- Divider rule -->
  <line x1="136" y1="16" x2="136" y2="50" stroke="#F46012" stroke-width="1.5" opacity="0.6"/>
  <!-- Full name stacked -->
  <text x="148" y="27" font-family="'Arial Narrow', 'Barlow Condensed', sans-serif"
        font-size="11" font-weight="700" letter-spacing="2.5" fill="#FAFAFA" text-anchor="start">INSTITUTE OF</text>
  <text x="148" y="43" font-family="'Arial Narrow', 'Barlow Condensed', sans-serif"
        font-size="11" font-weight="700" letter-spacing="2.5" fill="#FAFAFA" text-anchor="start">DIGITAL RISK</text>
</svg>
